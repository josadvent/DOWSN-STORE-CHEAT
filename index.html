body {

  font-family: 'Poppins', sans-serif;

}

/* HEADER */
.header {
  text-align: center;

.title {

@keyframes blink {

/* BUTTON */
.main-btn {

/* FILTER */

.card {

  padding: 15px;
  border-radius: 20px;
  background: #111;
  box-shadow: 0 0 20px #ff00ff50;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: #ff00ff;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.info {
  border: 1px solid white;
  padding: 8px 15px;
  border-radius: 10px;
  cursor: pointer;
}

.order {
  background: linear-gradient(45deg, #ff00ff, #9900ff);
  padding: 8px 15px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000cc;
  display: none;
  align-items: center;
  justify-content: center;
}
.popup-box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}
</style>
</head>

<!-- POPUP -->

  <div class="popup-box">

  </div>
</div>

<script>
function filterGame(game, el) {
  let cards = document.querySelectorAll(".card");
  let buttons = document.querySelectorAll(".filter button");

  buttons.forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");

  cards.forEach(card => {
    card.style.display = (game === "all" || card.classList.contains(game)) ? "block" : "none";
  });
}

function showInfo(text) {
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>
