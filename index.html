<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOWSN STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0b0b0f;
  font-family: 'Poppins', sans-serif;
  color: white;
}

.header {
  text-align: center;
  padding: 30px;
}
.title {
  font-family: 'Orbitron';
  font-size: 40px;
  text-shadow: 0 0 25px #ff00ff;
}

.main-btn {
  display: block;
  margin: 20px auto;
  width: 260px;
  padding: 14px;
  border-radius: 30px;
  border: 2px solid #ff00ff;
  color: #ff00ff;
  text-align: center;
  text-decoration: none;
}

.filter {
  text-align: center;
}
.filter button {
  margin: 5px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #1a1a1f;
  color: white;
  cursor: pointer;
}
.filter .active {
  background: linear-gradient(45deg, #ff00ff, #9900ff);
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 300px;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  background: #111;
  box-shadow: 0 0 20px #ff00ff50;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: #ff00ff;
}

.actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.info {
  border: 1px solid white;
  padding: 8px 15px;
  border-radius: 10px;
}

.order {
  background: linear-gradient(45deg, #ff00ff, #9900ff);
  padding: 8px 15px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">DOWSN STORE</div>
</div>

<a href="https://whatsapp.com/channel/0029VbCWSPqEgGfEQvFui73V" target="_blank" class="main-btn">
⭐ LIHAT TESTIMONI →
</a>

<div class="filter">
  <button onclick="filterGame('all', this)" class="active">ALL</button>
  <button onclick="filterGame('ff', this)">FREE FIRE</button>
  <button onclick="filterGame('ml', this)">MOBILE LEGENDS</button>
</div>

<div class="container">

<div class="card ff">
  <img src="https://via.placeholder.com/300x200?text=FREE+FIRE">
  <h3>HG CHEAT NO ROOT</h3>
  <p>10 Hari - <span class="price">95K</span></p>
  <p>30 Hari - <span class="price">165K</span></p>

  <div class="actions">
    <div class="info">INFO</div>
    <a href="https://wa.link/okvaxi" target="_blank" class="order">ORDER</a>
  </div>
</div>

<div class="card ml">
  <img src="https://via.placeholder.com/300x200?text=MOBILE+LEGENDS">
  <h3>ML MOD MENU</h3>
  <p>7 Hari - <span class="price">80K</span></p>
  <p>30 Hari - <span class="price">250K</span></p>

  <div class="actions">
    <div class="info">INFO</div>
    <a href="https://wa.link/okvaxi" target="_blank" class="order">ORDER</a>
  </div>
</div>

</div>

<script>
function filterGame(game, el) {
  let cards = document.querySelectorAll(".card");
  let buttons = document.querySelectorAll(".filter button");

  buttons.forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");

  cards.forEach(card => {
    if (game === "all") {
      card.style.display = "block";
    } else {
      card.style.display = card.classList.contains(game) ? "block" : "none";
    }
  });
}
</script>

</body>
</html>
